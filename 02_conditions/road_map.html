<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Science · ML · AI — Полный Roadmap</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f8;
            color: #1a2634;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 40px 24px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 36px;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(0, 20, 40, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0b1a2b;
            letter-spacing: -0.5px;
        }

        .header h1 .accent {
            color: #2563eb;
        }

        .header h1 .accent-purple {
            color: #7c3aed;
        }

        .header .subtitle {
            font-size: 14px;
            font-weight: 500;
            color: #4a5a6e;
            letter-spacing: 0.3px;
            margin-top: 4px;
        }

        .badge {
            background: #eef2f6;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #1e3a5f;
            border: 1px solid #dce2ea;
            white-space: nowrap;
        }

        .badge span {
            color: #2563eb;
        }

        /* PROGRESS */
        .global-progress {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 28px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }

        .global-progress .label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .global-progress .label span:last-child {
            color: #2563eb;
        }

        .global-progress .track {
            width: 100%;
            height: 8px;
            background: #e9edf2;
            border-radius: 30px;
            overflow: hidden;
        }

        .global-progress .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border-radius: 30px;
            transition: width 0.6s ease;
        }

        /* MODULES */
        .module {
            background: #ffffff;
            border-radius: 16px;
            margin-bottom: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .module:hover {
            border-color: #bdd3eb;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: #f9fbfd;
            border-bottom: 1px solid #eef2f6;
            cursor: pointer;
            user-select: none;
        }

        .module-header h2 {
            font-size: 17px;
            font-weight: 700;
            color: #0b1a2b;
        }

        .module-header .meta {
            font-size: 12px;
            font-weight: 600;
            color: #4a6a8a;
            background: #eef2f6;
            padding: 3px 14px;
            border-radius: 30px;
            font-family: 'JetBrains Mono', monospace;
        }

        .module-body {
            padding: 6px 24px 18px 24px;
        }

        /* TOPICS */
        .topic {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            margin-top: 4px;
            border-radius: 10px;
            transition: background 0.15s;
            cursor: pointer;
            border-left: 3px solid transparent;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topic:hover {
            background: #f5f8fc;
        }

        .topic .left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 180px;
        }

        .topic .status {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 2px solid #dce2ea;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            transition: all 0.3s;
        }

        .topic.done .status {
            border-color: #2563eb;
            background: #2563eb;
        }

        .topic.done .status::after {
            content: '✓';
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        .topic .name {
            font-size: 14px;
            font-weight: 500;
            color: #1a2a3a;
        }

        .topic .name .sub {
            font-size: 12px;
            font-weight: 400;
            color: #5a6e82;
            margin-left: 8px;
        }

        .topic .name .project-badge {
            font-size: 9px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: #ede9fe;
            color: #7c3aed;
            padding: 2px 12px;
            border-radius: 30px;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .topic .resources {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .topic .resources a {
            font-size: 10px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: #2563eb;
            text-decoration: none;
            background: #eef4fa;
            padding: 2px 12px;
            border-radius: 30px;
            border: 1px solid #dce8f2;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .topic .resources a:hover {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        .topic.done {
            border-left-color: #2563eb;
        }

        .topic.done .name {
            color: #4a5a6e;
        }

        .topic.done .name .sub {
            color: #6a7e92;
        }

        /* RESET */
        .reset-area {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .reset-btn {
            font-family: 'JetBrains Mono', monospace;
            background: transparent;
            border: 1px solid #dce2ea;
            color: #4a5a6e;
            padding: 8px 28px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .reset-btn:hover {
            border-color: #2563eb;
            color: #2563eb;
            background: #f0f6ff;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: #7a8a9e;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 700px) {
            body { padding: 16px 12px; }
            .header { padding: 18px 16px; }
            .header h1 { font-size: 18px; }
            .module-header { padding: 12px 14px; }
            .module-header h2 { font-size: 14px; }
            .module-body { padding: 6px 14px 14px 14px; }
            .topic .resources { justify-content: flex-start; margin-left: 38px; }
            .topic .name .sub { display: block; margin-left: 0; margin-top: 2px; }
        }
    </style>
</head>

<div class="container">
    <div class="header">

                { id: 't65', name: '10.2 LeetCode — алгоритмические задачи', sub: 'Easy → Medium', resources: [{ label: 'LeetCode', url: 'https://leetcode.com/' }] }
            ]
        }];

        const STORAGE_KEY = 'ds_ml_ai_roadmap_progress';

        function loadProgress() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    if (typeof parsed === 'object') return parsed;
                }
            } catch (e) { /* ignore */ }
            return {};
        }

        function saveProgress(progress) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        let progress = loadProgress();
        const allTopicIds = modules.flatMap(m => m.topics.map(t => t.id));

        let changed = false;
        allTopicIds.forEach(id => {
            if (!(id in progress)) {
                progress[id] = false;
                changed = true;
            }
        });
        if (changed) saveProgress(progress);

        function renderModules() {
            const container = document.getElementById('modulesContainer');
            let html = '';

            modules.forEach((module) => {
                const doneCount = module.topics.filter(t => progress[t.id] === true).length;
                const total = module.topics.length;
                html += `<div class="module">`;
                html += `<div class="module-header" data-module="${module.id}">`;
                html += `<h2>${module.title}</h2>`;
                html += `<span class="meta">${module.meta} · ${doneCount}/${total}</span>`;
                html += `</div>`;
                html += `<div class="module-body">`;
                module.topics.forEach(topic => {
                    const isDone = progress[topic.id] === true;
                    const isProject = topic.name.includes('⭐');
                    html += `<div class="topic ${isDone ? 'done' : ''}" data-topic="${topic.id}">`;
                    html += `<div class="left">`;
                    html += `<span class="status">${isDone ? '✅' : '⬜'}</span>`;
                    html += `<span class="name">${topic.name} <span class="sub">${topic.sub}</span>`;
                    if (isProject) {
                        html += `<span class="project-badge">⭐ проект</span>`;
                    }
                    html += `</span>`;
                    html += `</div>`;
                    html += `<div class="resources">`;
                    if (topic.resources && topic.resources.length) {
                        topic.resources.forEach(r => {
                            html += `<a href="${r.url}" target="_blank">${r.label}</a>`;
                        });
                    }
                    html += `</div>`;
                    html += `</div>`;
                });
                html += `</div>`;
                html += `</div>`;
            });

            container.innerHTML = html;

            document.querySelectorAll('.topic').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.tagName === 'A') return;
                    const id = this.dataset.topic;
                    if (!id) return;
                    progress[id] = !progress[id];
                    saveProgress(progress);
                    renderModules();
                    updateGlobalProgress();
                });
            });

            document.querySelectorAll('.module-header').forEach(header => {
                header.addEventListener('click', function() {
                    const body = this.nextElementSibling;
                    if (body && body.classList.contains('module-body')) {
                        const display = window.getComputedStyle(body).display;
                        body.style.display = display === 'none' ? 'block' : 'none';
                    }
                });
            });

            updateGlobalProgress();
        }

        function updateGlobalProgress() {
            const all = allTopicIds.length;
            if (all === 0) return;
            let done = 0;
            allTopicIds.forEach(id => {
                if (progress[id] === true) done++;
            });
            const percent = Math.round((done / all) * 100);
            document.getElementById('progressPercent').textContent = `${percent}% (${done}/${all})`;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Сбросить весь прогресс?')) {
                allTopicIds.forEach(id => progress[id] = false);
                saveProgress(progress);
                renderModules();
                updateGlobalProgress();
            }
        });

        renderModules();
    })();
</script>
