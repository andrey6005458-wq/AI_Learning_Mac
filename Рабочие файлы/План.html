<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Полный план: Python → ML → AI (Обновленный)</title>
    <style>
        /* ... CSS стили ... (вставь сюда стили из предыдущего сообщения) */
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {background: #0b0f1a; color: #e6edf3; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; padding: 30px 20px; line-height: 1.5;}
        .container {max-width: 1100px; margin: 0 auto;}
        .header {display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #2d3548;}
        .header h1 {font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #58a6ff, #9b59b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .badge {background: #1e2a3a; padding: 6px 18px; border-radius: 30px; font-size: 14px; border: 1px solid #2d3548; color: #8b949e;}
        .badge span {color: #f0f6fc;}
        .global-progress {background: #161b26; border: 1px solid #2d3548; border-radius: 14px; padding: 16px 24px; margin-bottom: 28px;}
        .global-progress .label {display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 6px;}
        .global-progress .track {width: 100%; height: 10px; background: #1e2a3a; border-radius: 30px; overflow: hidden;}
        .global-progress .fill {height: 100%; width: 0%; background: linear-gradient(90deg, #58a6ff, #9b59b6); border-radius: 30px; transition: width 0.3s ease;}
        .module {background: #161b26; border: 1px solid #2d3548; border-radius: 14px; margin-bottom: 20px; overflow: hidden;}
        .module-header {display: flex; justify-content: space-between; align-items: center; padding: 14px 22px; background: #1c2333; border-bottom: 1px solid #2d3548; cursor: pointer; user-select: none;}
        .module-header h2 {font-size: 18px; font-weight: 600;}
        .module-header .meta {font-size: 13px; color: #8b949e; background: #0b0f1a; padding: 2px 14px; border-radius: 30px;}
        .module-body {padding: 16px 22px 22px 22px;}
        .topic {display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; margin-bottom: 4px; border-radius: 8px; transition: background 0.15s; cursor: pointer; border-left: 3px solid transparent; flex-wrap: wrap; gap: 8px;}
        .topic:hover {background: #1e2a3a;}
        .topic .left {display: flex; align-items: center; gap: 12px; flex: 1; min-width: 180px;}
        .topic .status {font-size: 20px; width: 30px; text-align: center; flex-shrink: 0;}
        .topic .name {font-size: 15px;}
        .topic .name .sub {font-size: 13px; color: #8b949e; margin-left: 8px;}
        .topic .resources {display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;}
        .topic .resources a {font-size: 12px; color: #58a6ff; text-decoration: none; background: #0f141f; padding: 2px 12px; border-radius: 30px; border: 1px solid #252d3f; transition: 0.2s; white-space: nowrap;}
        .topic .resources a:hover {background: #1e2a3a; border-color: #58a6ff;}
        .topic.done {border-left-color: #2ea043;}
        .topic.done .name {color: #b1bac4;}
        .reset-area {margin-top: 30px; display: flex; justify-content: flex-end;}
        .reset-btn {background: transparent; border: 1px solid #2d3548; color: #8b949e; padding: 6px 24px; border-radius: 30px; font-size: 13px; cursor: pointer; transition: 0.2s;}
        .reset-btn:hover {border-color: #f85149; color: #f85149;}
        .footer {margin-top: 30px; font-size: 13px; color: #8b949e; text-align: center; border-top: 1px solid #2d3548; padding-top: 18px;}
        @media (max-width: 700px) {.topic .resources {justify-content: flex-start; margin-left: 42px;} .header h1 {font-size: 20px;}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📘 Полный план: Python → ML → AI</h1>
        <div class="badge">🎯 6 месяцев · <span>Junior DS / ML</span></div>
    </div>
    <div class="global-progress">
        <div class="label"><span>📊 Общий прогресс</span><span id="progressPercent">0%</span></div>
        <div class="track"><div class="fill" id="progressFill" style="width: 0%;"></div></div>
    </div>
    <div id="modulesContainer"></div>
    <div class="reset-area"><button class="reset-btn" id="resetBtn">🗑️ Сбросить прогресс</button></div>
    <div class="footer">Нажимай на тему, чтобы отметить её как пройденную. Прогресс сохраняется в браузере.</div>
</div>
<script>
    (function() {
        const modules = [{
            id: 'm1',
            title: '📘 Блок 1. Яндекс Хендбук по Python',
            meta: '1–2 месяца',
            topics: [
                { id: 't1', name: '1.1 Установка Python и VS Code', sub: 'настройка среды', resources: [{ label: 'python.org', url: 'https://python.org' }] },
                { id: 't2', name: '1.2 Переменные, типы данных', sub: 'int, float, str, bool', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't3', name: '1.3 Ввод и вывод (input / print)', sub: 'f-строки', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't4', name: '1.4 Арифметические операции', sub: '+ - * / // % **', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't5', name: '1.5 Форматирование строк', sub: 'f-string, :02d', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't6', name: '2.1 Ввод/вывод, операции с числами, строками', sub: 'повторение', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't7', name: '2.2 Условный оператор', sub: 'if/elif/else', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't8', name: '2.3 Сравнение строк', sub: '==, !=, <, >', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't9', name: '2.4 Match-case', sub: 'новый синтаксис', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't10', name: '3.1 Цикл for', sub: 'range, итерация', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't11', name: '3.2 Цикл while', sub: 'условие выхода', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't12', name: '3.3 Списки (list)', sub: 'методы: append, remove, sort', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't13', name: '3.4 Кортежи (tuple)', sub: 'неизменяемые', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't14', name: '3.5 Словари (dict)', sub: 'ключ-значение', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't15', name: '3.6 Множества (set)', sub: 'уникальные элементы', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't16', name: '4.1 Создание функций (def)', sub: 'аргументы, return', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't17', name: '4.2 Области видимости', sub: 'global, local', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't18', name: '4.3 Модули и импорт', sub: 'import, from', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't19', name: '5.1 Классы, поля и методы', sub: 'ООП', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't20', name: '5.2 Волшебные методы, наследование', sub: 'магия Python', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't21', name: '5.3 Исключения: try/except/else/finally', sub: 'обработка ошибок', resources: [{ label: 'Яндекс Хендбук', url: 'https://education.yandex.ru/handbook/python' }] },
                { id: 't22', name: '6.1 Модули math и numpy', sub: 'математика и массивы', resources: [{ label: 'NumPy (офиц.)', url: 'https://numpy.org/doc/stable/user/quickstart.html' }, { label: 'КНИТУ (рус.)', url: 'https://moodle.kstu.ru/pluginfile.php/605574/mod_resource/content/1/Titov-Osnovy_raboty_bibliotekoi_NumPy_2024.pdf' }] },
                { id: 't23', name: '6.2 Модуль pandas', sub: 'таблицы и анализ данных', resources: [{ label: 'Pandas (офиц.)', url: 'https://pandas.pydata.org/docs/' }, { label: 'Habr (рус.)', url: 'https://habr.com/ru/company/ods/blog/322626/' }, { label: 'Pythonru (рус.)', url: 'https://pythonru.com/uroki/osnovy-pandas-1-chtenie-fajlov-dataframe-otbor-dannyh' }] },
                { id: 't24', name: '6.3 Модуль requests', sub: 'HTTP-запросы к API', resources: [{ label: 'Requests (офиц.)', url: 'https://docs.python-requests.org/en/latest/' }, { label: 'Яндекс (рус.)', url: 'https://education.yandex.ru/handbook/python/article/modul-requests' }, { label: 'Python-course (рус.)', url: 'https://python-course.readthedocs.io/projects/elementary/en/latest/lessons/14-requests.html' }] },
                { id: 't25', name: '6.4 Чему вы научились', sub: 'итоговый проект', resources: [{ label: 'GitHub', url: 'https://github.com/' }] }
            ]
        }, {
            id: 'm2',
            title: '📐 Блок 2. Математика для ML',
            meta: '1 месяц',
            topics: [
                { id: 't26', name: '2.1 Линейная алгебра: векторы и матрицы', sub: '3Blue1Brown', resources: [{ label: '3Blue1Brown', url: 'https://www.youtube.com/playlist?list=PLZHQObOWTQDPD3MizzM2xVFitgF8hE_ab' }] },
                { id: 't27', name: '2.2 Статистика и вероятность', sub: 'StatQuest', resources: [{ label: 'StatQuest (плейлист)', url: 'https://www.youtube.com/@statquest' }] }
            ]
        }, {
            id: 'm3',
            title: '🗄️ Блок 3. SQL',
            meta: '1 месяц',
            topics: [
                { id: 't31', name: '3.1 SELECT, FROM, WHERE', sub: 'выборка данных', resources: [{ label: 'SQL Academy', url: 'https://sql-academy.org/ru' }] },
                { id: 't32', name: '3.2 JOIN (INNER, LEFT, RIGHT)', sub: 'объединение таблиц', resources: [{ label: 'SQL Academy', url: 'https://sql-academy.org/ru' }] },
                { id: 't33', name: '3.3 GROUP BY, HAVING, агрегатные функции', sub: 'группировка данных', resources: [{ label: 'SQL Academy', url: 'https://sql-academy.org/ru' }] },
                { id: 't34', name: '3.4 Подзапросы и оконные функции', sub: 'продвинутый SQL', resources: [{ label: 'SQL Academy', url: 'https://sql-academy.org/ru' }] },
                { id: 't35', name: '3.5 Практика: LeetCode (Easy/Medium)', sub: '20 задач на SQL', resources: [{ label: 'LeetCode', url: 'https://leetcode.com/' }] }
            ]
        }, {
            id: 'm4',
            title: '📊 Блок 4. Pandas + NumPy + Визуализация',
            meta: '1 месяц',
            topics: [
                { id: 't36', name: '4.1 NumPy: массивы и операции', sub: 'база для данных', resources: [{ label: 'NumPy', url: 'https://numpy.org/doc/stable/user/quickstart.html' }] },
                { id: 't37', name: '4.2 Pandas: Series и DataFrame', sub: 'таблицы данных', resources: [{ label: 'Pandas', url: 'https://pandas.pydata.org/docs/' }] },
                { id: 't38', name: '4.3 Очистка данных в Pandas', sub: 'dropna, fillna, duplicates', resources: [{ label: 'Pandas', url: 'https://pandas.pydata.org/docs/' }] },
                { id: 't39', name: '4.4 Группировки и сводные таблицы', sub: 'groupby, pivot_table', resources: [{ label: 'Pandas', url: 'https://pandas.pydata.org/docs/' }] },
                { id: 't40', name: '4.5 Matplotlib: базовые графики', sub: 'line, scatter, hist', resources: [{ label: 'Matplotlib', url: 'https://matplotlib.org/stable/tutorials/index.html' }] },
                { id: 't41', name: '4.6 Seaborn: статистические графики', sub: 'pairplot, boxplot', resources: [{ label: 'Seaborn', url: 'https://seaborn.pydata.org/tutorial.html' }] },
                { id: 't42', name: '4.7 Проект: EDA на данных о домах', sub: 'анализ + визуализация', resources: [{ label: 'Kaggle', url: 'https://www.kaggle.com/' }] }
            ]
        }, {
            id: 'm5',
            title: '🤖 Блок 5. Machine Learning',
            meta: '1 месяц',
            topics: [
                { id: 't43', name: '5.1 Линейная регрессия (scikit-learn)', sub: 'предсказание чисел', resources: [{ label: 'Microsoft ML', url: 'https://github.com/microsoft/ML-For-Beginners' }] },
                { id: 't44', name: '5.2 Логистическая регрессия', sub: 'бинарная классификация', resources: [{ label: 'Microsoft ML', url: 'https://github.com/microsoft/ML-For-Beginners' }] },
                { id: 't45', name: '5.3 Деревья решений и Random Forest', sub: 'ансамблевые методы', resources: [{ label: 'Microsoft ML', url: 'https://github.com/microsoft/ML-For-Beginners' }] },
                { id: 't46', name: '5.4 Метрики качества: MAE, MSE, R², Accuracy', sub: 'оценка моделей', resources: [{ label: 'Microsoft ML', url: 'https://github.com/microsoft/ML-For-Beginners' }] },
                { id: 't47', name: '5.5 Cross-validation и поиск гиперпараметров', sub: 'GridSearchCV', resources: [{ label: 'scikit-learn', url: 'https://scikit-learn.org/stable/' }] },
                { id: 't48', name: '5.6 Проект: Titanic (ML)', sub: 'предсказание выживаемости', resources: [{ label: 'Kaggle', url: 'https://www.kaggle.com/c/titanic' }] }
            ]
        }, {
            id: 'm6',
            title: '🧠 Блок 6. Deep Learning (PyTorch)',
            meta: '1 месяц',
            topics: [
                { id: 't49', name: '6.1 Тензоры и градиенты (PyTorch)', sub: 'autograd', resources: [{ label: 'PyTorch', url: 'https://pytorch.org/tutorials/' }] },
                { id: 't50', name: '6.2 Линейные слои и функции активации', sub: 'ReLU, Softmax', resources: [{ label: 'PyTorch', url: 'https://pytorch.org/tutorials/' }] },
                { id: 't51', name: '6.3 Обучение нейросети на MNIST', sub: 'распознавание цифр', resources: [{ label: 'PyTorch', url: 'https://pytorch.org/tutorials/beginner/basics/quickstart_tutorial.html' }] },
                { id: 't52', name: '6.4 Проект: CIFAR-10', sub: 'классификация изображений', resources: [{ label: 'CIFAR-10', url: 'https://www.cs.toronto.edu/~kriz/cifar.html' }] }
            ]
        }, {
            id: 'm7',
            title: '🎯 Блок 7. Финал: портфолио и собеседования',
            meta: '1 месяц',
            topics: [
                { id: 't53', name: '7.1 Оформление портфолио на GitHub', sub: 'README.md', resources: [{ label: 'GitHub', url: 'https://github.com/' }] },
                { id: 't54', name: '7.2 Подготовка к собеседованиям', sub: 'LeetCode, теория ML', resources: [{ label: 'LeetCode', url: 'https://leetcode.com/' }] },
                { id: 't55', name: '7.3 Поиск стажировок', sub: 'Andersen, EPAM, Яндекс', resources: [{ label: 'hh.ge', url: 'https://tbilisi.headhunter.ge/' }] }
            ]
        }, {
            id: 'm8',
            title: '🧩 Блок 8. Практика: решение задач',
            meta: 'На всех этапах',
            topics: [
                { id: 't56', name: '8.1 Codédex — задачи по Python', sub: 'от начальных до продвинутых', resources: [{ label: 'Codédex', url: 'https://www.codedex.io/python' }] },
                { id: 't57', name: '8.2 LeetCode — алгоритмические задачи', sub: 'Easy → Medium', resources: [{ label: 'LeetCode', url: 'https://leetcode.com/' }] }
            ]
        }];

        const STORAGE_KEY = 'ai_tracker_progress';

        function loadProgress() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    if (typeof parsed === 'object') return parsed;
                }
            } catch (e) { /* ignore */ }
            return {};
        }

        function saveProgress(progress) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        let progress = loadProgress();
        const allTopicIds = modules.flatMap(m => m.topics.map(t => t.id));

        let changed = false;
        allTopicIds.forEach(id => {
            if (!(id in progress)) {
                progress[id] = false;
                changed = true;
            }
        });
        if (changed) saveProgress(progress);

        function renderModules() {
            const container = document.getElementById('modulesContainer');
            let html = '';

            modules.forEach((module) => {
                const doneCount = module.topics.filter(t => progress[t.id] === true).length;
                const total = module.topics.length;
                html += `<div class="module">`;
                html += `<div class="module-header" data-module="${module.id}">`;
                html += `<h2>${module.title}</h2>`;
                html += `<span class="meta">${module.meta} · ${doneCount}/${total}</span>`;
                html += `</div>`;
                html += `<div class="module-body">`;
                module.topics.forEach(topic => {
                    const isDone = progress[topic.id] === true;
                    html += `<div class="topic ${isDone ? 'done' : ''}" data-topic="${topic.id}">`;
                    html += `<div class="left">`;
                    html += `<span class="status">${isDone ? '✅' : '⬜'}</span>`;
                    html += `<span class="name">${topic.name} <span class="sub">${topic.sub}</span></span>`;
                    html += `</div>`;
                    html += `<div class="resources">`;
                    if (topic.resources && topic.resources.length) {
                        topic.resources.forEach(r => {
                            html += `<a href="${r.url}" target="_blank">${r.label}</a>`;
                        });
                    }
                    html += `</div>`;
                    html += `</div>`;
                });
                html += `</div>`;
                html += `</div>`;
            });

            container.innerHTML = html;

            document.querySelectorAll('.topic').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.tagName === 'A') return;
                    const id = this.dataset.topic;
                    if (!id) return;
                    progress[id] = !progress[id];
                    saveProgress(progress);
                    renderModules();
                    updateGlobalProgress();
                });
            });

            document.querySelectorAll('.module-header').forEach(header => {
                header.addEventListener('click', function() {
                    const body = this.nextElementSibling;
                    if (body && body.classList.contains('module-body')) {
                        const display = window.getComputedStyle(body).display;
                        body.style.display = display === 'none' ? 'block' : 'none';
                    }
                });
            });

            updateGlobalProgress();
        }

        function updateGlobalProgress() {
            const all = allTopicIds.length;
            if (all === 0) return;
            let done = 0;
            allTopicIds.forEach(id => {
                if (progress[id] === true) done++;
            });
            const percent = Math.round((done / all) * 100);
            document.getElementById('progressPercent').textContent = `${percent}% (${done}/${all})`;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Точно сбросить весь прогресс?')) {
                allTopicIds.forEach(id => progress[id] = false);
                saveProgress(progress);
                renderModules();
                updateGlobalProgress();
            }
        });

        renderModules();
    })();
</script>
</body>
</html>
